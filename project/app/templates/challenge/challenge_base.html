<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Django Challenge</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>
<body class="bg-light">

  <!-- 상단 네비게이션 바 -->
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container d-flex justify-content-between">
      <a class="navbar-brand mb-0 h1" href="{% url 'challenge_list' %}">
        Django Challenge
      </a>

      <div>
        {% if user.is_authenticated %}
          <span class="text-light me-2">{{ user.username }}님</span>

          <a href="{% url 'mypage' %}" class="btn btn-sm btn-outline-light me-2">
            마이페이지
          </a>

          <a href="{% url 'user_logout' %}" class="btn btn-sm btn-outline-light">
            로그아웃
          </a>
        {% else %}
          <a href="{% url 'index' %}" class="btn btn-sm btn-outline-light me-2">
            로그인
          </a>
          <a href="{% url 'index' %}" class="btn btn-sm btn-outline-light">
            회원가입
          </a>
        {% endif %}
        
      </div>
    </div>
  </nav>

  <!-- 메인 컨테이너 -->
  <div class="container pb-4">

    <!-- Django messages 출력 영역 -->
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} mb-3" role="alert">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <!-- 각 페이지에서 덮어쓸 영역 -->
    {% block content %}
    {% endblock %}
  </div>

  <!-- Bootstrap JS (선택) -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
  </script>
</body>
</html>
