<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>닉네임 설정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 아까 만든 로그인 페이지 스타일 유지 */
        body { background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* 배경을 흐리게 처리 */
        .login-background {
            filter: blur(5px);
            pointer-events: none; /* 배경 클릭 방지 */
            user-select: none;
            text-align: center;
        }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); width: 400px; }

        /* 모달 스타일 커스텀 */
        .modal-content { border: none; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .modal-header { border-bottom: none; padding-top: 30px; justify-content: center; }
        .modal-body { padding: 20px 40px; }
        .modal-footer { border-top: none; padding: 20px 40px 40px; }
        
        /* Django form.as_p 스타일 보정 */
        p label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        p input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="modal fade" id="nicknameModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">닉네임 설정</h5>
                </div>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="modal-body">
                        <p class="text-muted small text-center mb-4">서비스에서 사용하실 닉네임을 입력해주세요.</p>
                        
                        {{ form.as_p }}
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" style="border-radius: 8px;">
                            가입 완료 및 시작하기
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 페이지가 로드되자마자 모달을 띄웁니다.
        document.addEventListener('DOMContentLoaded', function() {
            var myModal = new bootstrap.Modal(document.getElementById('nicknameModal'));
            myModal.show();
        });
    </script>
</body>
</html>
