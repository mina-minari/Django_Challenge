{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload History</title>
  <link rel="stylesheet" href="{% static 'app/style.css' %}">
</head>
<body>
  <div class="layout">
    <header class="page-header">
      <h1 class="page-title">Upload History</h1>
      <a href="{% url 'mypage' %}" style="font-size:14px; text-decoration:none; color:#555;">
        &lt; Back to My Page
      </a>
    </header>

    <section class="upload-history-list">
      {% if verifications %}
        {% for v in verifications %}
          <div class="upload-card">
            <div class="upload-header">
              <div class="challenge-title">
                {{ v.challenge.title }}
              </div>
              <div class="upload-date">
                {{ v.date|date:"Y-m-d H:i" }}
              </div>
            </div>

            {% if v.image %}
              <div class="upload-image-wrapper">
                <img src="{{ v.image.url }}" alt="verification image" class="upload-image">
              </div>
            {% endif %}
          </div>
        {% endfor %}
      {% else %}
        <p>No verification uploads yet.</p>
      {% endif %}
    </section>
  </div>
</body>
</html>
